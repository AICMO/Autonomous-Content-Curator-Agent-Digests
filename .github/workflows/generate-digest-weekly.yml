name: Generate Weekly Digest

on:
  schedule:
    - cron: '0 6 * * 6'  # Saturday at 6:00 UTC
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD, default: 7 days ago)'
        required: false
      end_date:
        description: 'End date (YYYY-MM-DD, default: today)'
        required: false
      publish_telegram:
        description: 'Publish to Telegram'
        type: boolean
        default: true
      publish_ghost:
        description: 'Publish to Ghost'
        type: boolean
        default: true
      publish_substack:
        description: 'Publish to Substack'
        type: boolean
        default: true

concurrency:
  group: telegram-pipeline-weekly
  cancel-in-progress: false

permissions:
  contents: read
  actions: write   # Required for auto-retry
  id-token: write  # Required for Claude Code Action OIDC

env:
  TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
  TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
  TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
  TELEGRAM_PUBLISH_CHANNEL: ${{ vars.TELEGRAM_PUBLISH_CHANNEL }}
  GHOST_URL: ${{ vars.GHOST_URL }}
  GHOST_ADMIN_API_KEY: ${{ secrets.GHOST_ADMIN_API_KEY }}

  SUBSTACK_COOKIE: ${{ secrets.SUBSTACK_COOKIE }}
  SUBSTACK_PUBLICATION_URL: ${{ vars.SUBSTACK_PUBLICATION_URL }}

jobs:
  # --- Step 1: Read publish channel (last 7 days) + resolve links ---
  read:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Read publish channel with resolved links
        run: |
          cd agent/integrations/telegram
          pip install -r requirements.txt
          START_DATE="${{ github.event.inputs.start_date }}"
          END_DATE="${{ github.event.inputs.end_date }}"
          [ -z "$START_DATE" ] && START_DATE=$(date -u -d '7 days ago' +%Y-%m-%d)
          [ -z "$END_DATE" ] && END_DATE=$(date -u +%Y-%m-%d)
          python telegram.py --read --channel "$TELEGRAM_PUBLISH_CHANNEL" \
            --start-date "$START_DATE" --end-date "$END_DATE" --resolve-links

      - uses: actions/upload-artifact@v7
        with:
          name: messages
          path: /tmp/telegram_messages.json
          retention-days: 1

  # --- Step 2a: Generate weekly messenger content ---
  generate-messenger:
    needs: read
    if: ${{ github.event.inputs.publish_telegram != 'false' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: messages
          path: /tmp

      - name: Generate weekly Telegram digest
        uses: AICMO/llm-call-action@v1
        with:
          prompt_file: .github/prompts/generate-digest-weekly-messenger.md
          data_file: /tmp/telegram_messages.json
          output_file: /tmp/telegram_digest.txt
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          provider: ${{ vars.LLM_PROVIDER || 'claude' }}
          model: ${{ vars.LLM_MODEL || 'claude-sonnet-4-6' }}
          max_tokens: ${{ vars.LLM_MAX_TOKENS || '12288' }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          google_api_key: ${{ secrets.GOOGLE_API_KEY }}
          google_application_credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          vertex_project: ${{ vars.VERTEX_PROJECT }}
          vertex_region: ${{ vars.VERTEX_REGION }}
          max_turns: '12'
          claude_tools: 'Read'

      - uses: actions/upload-artifact@v7
        with:
          name: messenger-digest
          path: /tmp/telegram_digest.txt
          retention-days: 1

  # --- Step 2b: Generate weekly blog content ---
  generate-blog:
    needs: read
    if: ${{ github.event.inputs.publish_ghost != 'false' || github.event.inputs.publish_substack != 'false' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: messages
          path: /tmp

      - name: Generate weekly blog digest
        uses: AICMO/llm-call-action@v1
        with:
          prompt_file: .github/prompts/generate-digest-weekly-blog.md
          data_file: /tmp/telegram_messages.json
          output_file: /tmp/blog_digest.txt
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          provider: ${{ vars.LLM_PROVIDER || 'claude' }}
          model: ${{ vars.LLM_MODEL || 'claude-sonnet-4-6' }}
          max_tokens: ${{ vars.LLM_MAX_TOKENS || '12288' }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          google_api_key: ${{ secrets.GOOGLE_API_KEY }}
          google_application_credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          vertex_project: ${{ vars.VERTEX_PROJECT }}
          vertex_region: ${{ vars.VERTEX_REGION }}
          max_turns: '12'
          claude_tools: 'Read'

      - uses: actions/upload-artifact@v7
        with:
          name: blog-digest
          path: /tmp/blog_digest.txt
          retention-days: 1

  # --- Step 3a: Publish to Telegram ---
  publish-telegram:
    needs: generate-messenger
    if: ${{ github.event.inputs.publish_telegram != 'false' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v7
        with:
          name: messenger-digest
      - name: Publish
        run: |
          cp telegram_digest.txt /tmp/llm_response.txt
          cd agent/integrations/telegram
          pip install -r requirements.txt
          python telegram.py --post

  # --- Step 3b: Publish to Ghost ---
  publish-ghost:
    needs: generate-blog
    if: ${{ github.event.inputs.publish_ghost != 'false' }}
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v7
        with:
          name: blog-digest
      - name: Publish
        run: |
          cp blog_digest.txt /tmp/llm_response.txt
          START_DATE="${{ github.event.inputs.start_date }}"
          END_DATE="${{ github.event.inputs.end_date }}"
          [ -z "$START_DATE" ] && START_DATE=$(date -u -d '7 days ago' +%Y-%m-%d)
          [ -z "$END_DATE" ] && END_DATE=$(date -u +%Y-%m-%d)
          pip install -r agent/integrations/ghost/requirements.txt
          python agent/integrations/ghost/ghost.py --post \
            --start-date "$START_DATE" --end-date "$END_DATE"

  # --- Step 3c: Publish to Substack ---
  publish-substack:
    needs: generate-blog
    if: ${{ github.event.inputs.publish_substack != 'false' }}
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v7
        with:
          name: blog-digest
      - name: Publish
        run: |
          cp blog_digest.txt /tmp/llm_response.txt
          START_DATE="${{ github.event.inputs.start_date }}"
          END_DATE="${{ github.event.inputs.end_date }}"
          [ -z "$START_DATE" ] && START_DATE=$(date -u -d '7 days ago' +%Y-%m-%d)
          [ -z "$END_DATE" ] && END_DATE=$(date -u +%Y-%m-%d)
          pip install -r agent/integrations/substack/requirements.txt
          python agent/integrations/substack/substack.py --post \
            --start-date "$START_DATE" --end-date "$END_DATE"

  # --- Auto-retry on failure (up to 3 attempts) ---
  retry:
    needs: [generate-messenger, generate-blog, publish-telegram, publish-ghost, publish-substack]
    if: always() && failure() && fromJSON(github.run_attempt) < 3
    runs-on: ubuntu-latest
    steps:
      - name: Retry failed jobs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Attempt ${{ github.run_attempt }} failed -- retrying..."
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/rerun-failed-jobs -X POST
